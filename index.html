<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Facturación Profesional</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background-color: #f8f9fa; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        form { display: flex; gap: 10px; margin-bottom: 20px; padding: 15px; background: #e9ecef; border-radius: 5px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex: 1; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border: 1px solid #dee2e6; text-align: left; }
        th { background: #343a40; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>Gestión de Facturas</h1>

    <form id="facturaForm">
        <input type="text" id="cliente" placeholder="Cliente" required>
        <input type="text" id="nit_cc" placeholder="NIT/CC" required>
        <input type="number" id="subtotal" placeholder="Subtotal" step="0.01" required>
        <button type="submit">Guardar</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>NIT</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>

<script>
    const URL_API = "http://127.0.0.1:8000/facturas";

    // Función para obtener los datos
    async function cargar() {
        try {
            const res = await fetch(URL_API);
            const facturas = await res.json();
            const tabla = document.getElementById("cuerpoTabla");
            tabla.innerHTML = "";
            
            facturas.forEach(f => {
                tabla.innerHTML += `
                    <tr>
                        <td>${f.id}</td>
                        <td>${f.cliente}</td>
                        <td>${f.nit_cc}</td>
                        <td>$${f.total}</td>
                    </tr>
                `;
            });
        } catch (error) {
            console.error("Error cargando:", error);
        }
    }

    // Función para enviar los datos
    document.getElementById("facturaForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const data = {
            cliente: document.getElementById("cliente").value,
            nit_cc: document.getElementById("nit_cc").value,
            monto_subtotal: parseFloat(document.getElementById("subtotal").value),
            iva_porcentaje: 0.19
        };

        try {
            const res = await fetch(URL_API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                document.getElementById("facturaForm").reset();
                cargar(); // Recargar la tabla
            } else {
                alert("Error al guardar. Revisa la consola.");
            }
        } catch (error) {
            console.error("Error enviando:", error);
        }
    });

    // Cargar al iniciar
    window.onload = cargar;
</script>

</body>
</html>
